<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Tournament Timer</title>

<style>
body {
  margin: 0;
  color: #fff;
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden;

  background: radial-gradient(circle at center, #0b1f1a, #020504);
}

  .container {
    display: grid;
    grid-template-rows: auto auto auto 1fr;
    height: 100vh;
    width: 100vw;
    padding: 20px;
    box-sizing: border-box;
  }

  .level {
  font-size: 3vw;
  border-bottom: 1px solid rgba(255,255,255,0.1);

  color: rgba(255,255,255,0.6);
  letter-spacing: 0.15em;
}
  .timer {
  text-align: center;
  font-size: 15vw;
  border-bottom: 1px solid rgba(255,255,255,0.1);

  color: #f5e6c8;
  font-weight: 600;
  letter-spacing: 0.05em;

  text-shadow:
    0 0 6px rgba(245,230,200,0.4),
    0 0 12px rgba(245,230,200,0.2);
}

  .next-break {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: 3vw;

  color: #d4af37;
  text-shadow: 0 0 6px rgba(212,175,55,0.5);
}
  .blinds-area {
  display: flex;
  justify-content: center;
  gap: 40px;
  font-size: 6vw;
  border-bottom: 1px solid rgba(255,255,255,0.1);

  color: #ffffff;
}

  .controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
  }

  button {
  font-size: 2.5vw;
  padding: 10px 20px;
  margin-left: 10px;

  background: rgba(255,255,255,0.05);
  color: #f5e6c8;
  border: 1px solid rgba(212,175,55,0.4);
  border-radius: 6px;

  backdrop-filter: blur(4px);
}

button:active {
  background: rgba(212,175,55,0.2);
}
  button:active {
    transform: scale(0.92);
    background: #666;
  }

  /* フラッシュ演出 */
.blink {
  animation: blinkAnim 0.8s ease-in-out 3;
}

@keyframes blinkAnim {
  0% { opacity: 1; }
  50% { opacity: 0.2; }
  100% { opacity: 1; }
}

@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
  
</style>
</head>

<body>

<div class="container">
  <div class="level"></div>
  <div class="timer"></div>
  <div class="next-break"></div>
  <div class="blinds-area">
    <div class="blinds"></div>
    <div class="ante"></div>
  </div>
</div>

<div class="controls">
  <button onclick="toggleFullScreen()">FULL</button>
  <button onclick="prevLevel()">◀◀</button>
  <button onclick="nextLevel()">▶▶</button>
  <button onclick="startTimer()">START</button>
  <button onclick="pauseTimer()">STOP</button>
</div>

<script>
/* ===== ストラクチャー ===== */
const structure = [
  { level: 1, sb: 100, bb: 200, ante: 200, time: 30 },
  { level: 2, sb: 200, bb: 400, ante: 400, time: 30 },
  { level: 3, sb: 300, bb: 600, ante: 600, time: 30 },
  { level: 4, sb: 400, bb: 800, ante: 800, time: 30 },

  { break: true, name: 'BREAK', time: 10 },

  { level: 5, sb: 500, bb: 1000, ante: 1000, time: 30 },
  { level: 6, sb: 600, bb: 1200, ante: 1200, time: 30 },
  { level: 7, sb: 800, bb: 1600, ante: 1600, time: 30 },

  { break: true, name: 'BREAK & CHIP UP', time: 10 },

  { level: 8, sb: 1000, bb: 1500, ante: 1500, time: 25 },
  { level: 9, sb: 1000, bb: 2000, ante: 2000, time: 25 },

  { level: 10, sb: 1500, bb: 3000, ante: 3000, time: 20 },
  { level: 11, sb: 2000, bb: 4000, ante: 4000, time: 20 },
  { level: 12, sb: 2500, bb: 5000, ante: 5000, time: 20 },
  { level: 13, sb: 3000, bb: 6000, ante: 6000, time: 20 },

  { level: 14, sb: 5000, bb: 10000, ante: 10000, time: 15 },
  { level: 15, sb: 7000, bb: 15000, ante: 15000, time: 15 },
  { level: 16, sb: 10000, bb: 20000, ante: 20000, time: 15 },

  { level: 17, sb: 15000, bb: 30000, ante: 30000, time: 30 },
  { level: 18, sb: 30000, bb: 60000, ante: 60000, time: 30 }
];

/* ===== 変数 ===== */
let currentIndex = 0;
let remainingSeconds = structure[0].time * 60;
let timerId = null;

const levelEl = document.querySelector('.level');
const timerEl = document.querySelector('.timer');
const blindsEl = document.querySelector('.blinds');
const anteEl = document.querySelector('.ante');
const nextBreakEl = document.querySelector('.next-break');

/* ===== 効果音 ===== */
const sound5min = new Audio('5min.mp3');
const sound1min = new Audio('1min.mp3');
const soundLevelUp = new Audio('levelup.mp3');

let played5min = false;
let played1min = false;

/* ===== フォーマット ===== */
function formatMMSS(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatHMMSS(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* ===== フラッシュ ===== */
function blinkEffect() {
  timerEl.classList.add('blink');

  setTimeout(() => {
    timerEl.classList.remove('blink');
  }, 2400); // 0.8秒 × 3回
}

/* ===== NEXT BREAK ===== */
function calcNextBreakSeconds() {
  let sec = remainingSeconds;

  for (let i = currentIndex + 1; i < structure.length; i++) {
    if (structure[i].break) break; // ← 先に判定
    sec += structure[i].time * 60;
  }

  return sec;
}

/* ===== 表示更新 ===== */
function updateDisplay() {
  const current = structure[currentIndex];

  if (current.break) {
    levelEl.textContent = current.name;
    blindsEl.textContent = '';
    anteEl.textContent = '';
  } else {
    levelEl.textContent = `LEVEL ${current.level}`;
    blindsEl.textContent = `${current.sb} / ${current.bb}`;
    anteEl.textContent = `ANTE ${current.ante}`;
  }

  timerEl.textContent = formatMMSS(remainingSeconds);
  nextBreakEl.textContent = `NEXT BREAK ${formatHMMSS(calcNextBreakSeconds())}`;
}

/* ===== タイマー ===== */
function tick() {
  if (remainingSeconds === 300 && !played5min) { sound5min.play(); played5min = true; }
  if (remainingSeconds === 60 && !played1min) { sound1min.play(); played1min = true; }

  if (remainingSeconds > 0) {
    remainingSeconds--;
  } else {
    soundLevelUp.play();
    blinkEffect();
    currentIndex++;
    if (currentIndex >= structure.length) {
      clearInterval(timerId);
      return;
    }
    remainingSeconds = structure[currentIndex].time * 60;
    played5min = false;
    played1min = false;
  }
  updateDisplay();
}

/* ===== 操作 ===== */
function startTimer() {
  if (timerId) return;
  timerId = setInterval(tick, 1000);
}

function pauseTimer() {
  clearInterval(timerId);
  timerId = null;
}

function nextLevel() {
  if (currentIndex >= structure.length - 1) return;
  currentIndex++;
  remainingSeconds = structure[currentIndex].time * 60;
  played5min = false;
  played1min = false;
  soundLevelUp.play();
  blinkEffect();
  updateDisplay();
}

function prevLevel() {
  if (currentIndex <= 0) return;
  currentIndex--;
  remainingSeconds = structure[currentIndex].time * 60;
  played5min = false;
  played1min = false;
  blinkEffect();
  updateDisplay();
}

function toggleFullScreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

/* 初期表示 */
updateDisplay();
</script>

</body>
</html>
