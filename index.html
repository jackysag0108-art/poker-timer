<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Tournament Timer</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  color: #fff;
  font-family: 'Cormorant Garamond', serif;
  overflow: hidden;
  background: radial-gradient(circle at center, #0b1f1a, #020504);
}

/* 全体 */
.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 20px;
  box-sizing: border-box;
}

/* 上段 */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title {
  font-size: 3vw;
  color: rgba(255,255,255,0.6);
}

.next-break {
  font-size: 3vw;
  color: rgba(255,255,255,0.5);

  display: inline-block;
  text-align: right;

  font-variant-numeric: tabular-nums lining-nums;
  font-feature-settings: "tnum";
}

/* 中央 */
.main-area {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 40px;
  flex: 1;
}

.level {
  font-size: 3vw;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.15em;
  margin-bottom: 2vh;
  text-align: center;

  line-height: 1.2; 
}

.level-num {
  font-size: 5.5vw;
  font-weight: 700;
  color: #f5e6c8;

  text-shadow:
    0 0 4px rgba(245,230,200,0.3);
}

.timer {
  font-size: 15vw;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: #f5e6c8;

  text-shadow:
    0 0 4px rgba(245,230,200,0.4),
    0 0 10px rgba(245,230,200,0.25);

  font-variant-numeric: tabular-nums lining-nums;
  font-feature-settings: "tnum";

  display: inline-block;
  text-align: center;
}

/* 下段 */
.blinds-area {
  text-align: center;
  font-size: 6vw;
  margin-top: 20px;

  color: #f5e6c8;
  font-weight: 600;

  text-shadow:
    0 0 3px rgba(245,230,200,0.25);

  margin-bottom: 12vh;
}

.ante {
  margin-left: 20px;
  opacity: 0.85;
}

/* ボタン */
.controls {
  position: fixed;
  bottom: 3vh;   /* ← pxではなくvhに */
  right: 3vw;
}

button {
  font-size: 2.5vw;
  padding: 10px 20px;
  margin-left: 10px;

  background: rgba(255,255,255,0.05);
  color: #f5e6c8;
  border: 1px solid rgba(212,175,55,0.4);
  border-radius: 6px;
}

button:active {
  transform: scale(0.92);
  background: rgba(212,175,55,0.2);
}

/* 点滅 */
.blink {
  animation: blinkAnim 0.8s ease-in-out 3;
}

@keyframes blinkAnim {
  0% { opacity: 1; }
  50% { opacity: 0.2; }
  100% { opacity: 1; }
}
</style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <div class="title">salmon Birthday Bounty</div>
    <div class="next-break"></div>
  </div>

  <div class="main-area">
    <div class="level"></div>
    <div class="timer"></div>
  </div>

  <div class="blinds-area">
    <span class="blinds"></span>
    <span class="ante"></span>
  </div>

</div>

<div class="controls">
  <button onclick="toggleFullScreen()">FULL</button>
  <button onclick="prevLevel()">◀◀</button>
  <button onclick="nextLevel()">▶▶</button>
  <button onclick="startTimer()">START</button>
  <button onclick="pauseTimer()">STOP</button>
</div>

<script>
const structure = [
  { level: 1, sb: 100, bb: 200, ante: 200, time: 30 },
  { level: 2, sb: 200, bb: 400, ante: 400, time: 30 },
  { level: 3, sb: 300, bb: 600, ante: 600, time: 30 },
  { level: 4, sb: 400, bb: 800, ante: 800, time: 30 },
  { break: true, name: 'BREAK', time: 10 },
  { level: 5, sb: 500, bb: 1000, ante: 1000, time: 30 },
  { level: 6, sb: 600, bb: 1200, ante: 1200, time: 30 },
  { level: 7, sb: 800, bb: 1600, ante: 1600, time: 30 },
  { break: true, name: 'BREAK & CHIP UP', time: 10 },
  { level: 8, sb: 1000, bb: 1500, ante: 1500, time: 25 },
  { level: 9, sb: 1000, bb: 2000, ante: 2000, time: 25 },
  { level: 10, sb: 1500, bb: 3000, ante: 3000, time: 20 },
  { level: 11, sb: 2000, bb: 4000, ante: 4000, time: 20 },
  { level: 12, sb: 2500, bb: 5000, ante: 5000, time: 20 },
  { level: 13, sb: 3000, bb: 6000, ante: 6000, time: 20 },
  { level: 14, sb: 5000, bb: 10000, ante: 10000, time: 15 },
  { level: 15, sb: 7000, bb: 15000, ante: 15000, time: 15 },
  { level: 16, sb: 10000, bb: 20000, ante: 20000, time: 15 },
  { level: 17, sb: 15000, bb: 30000, ante: 30000, time: 30 },
  { level: 18, sb: 30000, bb: 60000, ante: 60000, time: 30 }
];

let currentIndex = 0;
let remainingSeconds = structure[0].time * 60;
let timerId = null;

const levelEl = document.querySelector('.level');
const timerEl = document.querySelector('.timer');
const blindsEl = document.querySelector('.blinds');
const anteEl = document.querySelector('.ante');
const nextBreakEl = document.querySelector('.next-break');

const sound5min = new Audio('5min.mp3');
const sound1min = new Audio('1min.mp3');
const soundLevelUp = new Audio('levelup.mp3');

let played5min = false;
let played1min = false;

function formatMMSS(sec) {
  return `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
}

function formatHMMSS(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function calcNextBreakSeconds() {
  let sec = remainingSeconds;
  for (let i = currentIndex + 1; i < structure.length; i++) {
    if (structure[i].break) break;
    sec += structure[i].time * 60;
  }
  return sec;
}

function updateDisplay() {
  const current = structure[currentIndex];

  if (current.break) {
    levelEl.textContent = current.name;
    blindsEl.textContent = '';
    anteEl.textContent = '';
  } else {
    levelEl.innerHTML = `LEVEL<br><span class="level-num">${current.level}</span>`;
    blindsEl.textContent = `${current.sb} / ${current.bb}`;
    anteEl.textContent = `ANTE ${current.ante}`;
  }

  timerEl.textContent = formatMMSS(remainingSeconds);
  nextBreakEl.textContent = `NEXT BREAK ${formatHMMSS(calcNextBreakSeconds())}`;
}

function blinkEffect() {
  timerEl.classList.add('blink');
  setTimeout(() => timerEl.classList.remove('blink'), 2400);
}

function tick() {
  if (remainingSeconds === 300 && !played5min) {
  sound5min.play();
  played5min = true;
}
if (remainingSeconds === 60 && !played1min) {
  sound1min.play();
  played1min = true;
}
  if (remainingSeconds > 0) {
    remainingSeconds--;
  } else {
    soundLevelUp.play();
    blinkEffect();
    currentIndex++;
    if (currentIndex >= structure.length) return;
    remainingSeconds = structure[currentIndex].time * 60;
    played5min = false;
    played1min = false;
  }
  updateDisplay();
}

function startTimer() {
  if (!timerId) timerId = setInterval(tick, 1000);
}

function pauseTimer() {
  clearInterval(timerId);
  timerId = null;
}

function nextLevel() {
  if (currentIndex < structure.length - 1) {
    currentIndex++;
    remainingSeconds = structure[currentIndex].time * 60;

    // ★これを追加
    played5min = false;
    played1min = false;

    soundLevelUp.play();   // ← 念のためここも明示
    blinkEffect();
    updateDisplay();
  }
}

function prevLevel() {
  if (currentIndex > 0) {
    currentIndex--;
    remainingSeconds = structure[currentIndex].time * 60;

    // ★これを追加
    played5min = false;
    played1min = false;

    soundLevelUp.play();
    blinkEffect();
    updateDisplay();
  }
}
function toggleFullScreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

updateDisplay();
</script>

</body>
</html>
